<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BursaryBot Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    margin: 0;
}

.navbar {
    background: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
}

.container {
    padding: 20px;
}

.card {
    background: white;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
}

.chat-item {
    padding: 10px;
    border-bottom: 1px solid #eee;
    cursor: pointer;
}
.chat-item:hover {
    background: #f0f0f0;
}

.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
}

.modal-box {
    background: white;
    padding: 20px;
    width: 80%;
    border-radius: 10px;
}
</style>

<body>

<div class="navbar">
    <h2>BursaryBot</h2>
    <button id="logoutBtn">Logout</button>
</div>

<div class="container">

    <h3>Welcome, <span id="userName">Student</span></h3>

    <div class="card">
        <h4>Stats</h4>
        <p>Chats: <span id="chatCount">0</span></p>
        <p>Bursaries: <span id="bursaryCount">0</span></p>
        <p>Matches: <span id="matchCount">0</span></p>
    </div>

    <div class="card">
        <h4>Recent Chats</h4>
        <div id="chatHistory"></div>
    </div>

</div>

<!-- Modal -->
<div class="modal" id="modal">
    <div class="modal-box">
        <h3>Conversation</h3>
        <div id="modalContent"></div>
        <button onclick="closeModal()">Close</button>
    </div>
</div>

<script>
/* ✅ FIX 1: DEFINE API BASE */
const API_URL = "https://bursarybot.onrender.com/api";

/* AUTH */
const token = localStorage.getItem("token");
const user = JSON.parse(localStorage.getItem("user") || "{}");

if (!token) {
    window.location.href = "login.html";
}

document.getElementById("userName").textContent =
    user.username || "Student";

/* GLOBAL CHAT STORE */
let allChats = [];

/* LOAD DASHBOARD */
async function loadDashboard() {
    try {

        /* CHAT HISTORY */
        const res = await fetch(`${API_URL}/chat/history`, {
            headers: {
                Authorization: `Bearer ${token}`
            }
        });

        const data = await res.json();
        allChats = data.history || [];

        document.getElementById("chatCount").textContent = allChats.length;

        document.getElementById("chatHistory").innerHTML =
            allChats.slice(0, 10).map(c => `
                <div class="chat-item" onclick="openChat(${c.id})">
                    <b>${escapeHtml(c.question || "").slice(0, 60)}</b>
                    <small> - ${new Date(c.created_at).toLocaleDateString()}</small>
                </div>
            `).join("") || "<p>No chats yet</p>";

        /* BURSARIES */
        const bursaryRes = await fetch(`${API_URL}/external-bursaries`);
        const bursaryData = await bursaryRes.json();

        document.getElementById("bursaryCount").textContent =
            bursaryData.bursaries?.length || 0;

        document.getElementById("matchCount").textContent =
            bursaryData.bursaries?.length || 0;

    } catch (err) {
        console.log("Dashboard error:", err);
    }
}

/* OPEN CHAT */
function openChat(id) {
    const chat = allChats.find(c => c.id === id);
    if (!chat) return;

    document.getElementById("modalContent").innerHTML = `
        <p><b>Q:</b> ${escapeHtml(chat.question)}</p>
        <p><b>A:</b> ${escapeHtml(chat.answer || "")}</p>
        <small>${new Date(chat.created_at).toLocaleString()}</small>
    `;

    document.getElementById("modal").style.display = "flex";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

/* ESCAPE HTML */
function escapeHtml(text) {
    return (text || "").replace(/[&<>"']/g, m => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#039;"
    }[m]));
}

/* LOGOUT */
document.getElementById("logoutBtn").addEventListener("click", () => {
    localStorage.clear();
    window.location.href = "login.html";
});

loadDashboard();
</script>

</body>
</html>
